
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>จองที่นั่งรถตู้ - เที่ยวนี่เหอะ 🚐✨</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* --- CSS เดิมคงไว้ และเพิ่มส่วน Login --- */
    * { box-sizing: border-box !important; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif; background: #070a13; color: #f1f5f9; min-height: 100vh; }

    /* Login Screen Overlay */
    #loginOverlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #070a13; z-index: 5000; display: flex; align-items: center; justify-content: center;
        transition: 0.5s;
    }
    .login-card {
        width: 90%; max-width: 350px; text-align: center; background: rgba(30, 41, 59, 0.7);
        padding: 40px 25px; border-radius: 30px; border: 1px solid rgba(56, 189, 248, 0.3);
    }

    /* Header & General UI */
    .header-sticky { position: sticky; top: 0; background: rgba(7, 10, 19, 0.85); backdrop-filter: blur(12px); z-index: 1000; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-brand img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #38bdf8; }
    
    /* Booking Card */
    .main-wrapper { padding: 20px 15px 120px; display: flex; flex-direction: column; align-items: center; }
    .card { width: 100%; max-width: 420px; background: rgba(30, 41, 59, 0.7); border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
    
    .field-input { width: 100%; padding: 0 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); font-size: 16px; background: #0f172a; color: white; height: 54px; outline: none; margin-bottom: 15px; }

    /* Seats */
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 24px; }
    .seat { aspect-ratio: 1/1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; transition: 0.2s; font-size: 12px; }
    .seat.empty { background: linear-gradient(145deg, #10b981, #059669); color: white; box-shadow: 0 4px 0 #047857; }
    .seat.booked { background: linear-gradient(145deg, #ef4444, #b91c1c); color: white; cursor: not-allowed; }
    .seat.selected { background: linear-gradient(145deg, #fbbf24, #f59e0b); color: #000; transform: scale(1.1); animation: heartbeat 0.8s infinite; }

    /* My Booking List Area */
    .my-booking-item { background: rgba(56, 189, 248, 0.1); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(56,189,248,0.2); display: flex; justify-content: space-between; align-items: center; }
    .btn-cancel { background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; }

    .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); padding: 15px 20px 30px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
    .btn-main { width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 18px; font-weight: 700; background: #334155; color: #64748b; cursor: pointer; }
    .btn-main.active { background: #38bdf8; color: #0f172a; box-shadow: 0 8px 20px rgba(56, 189, 248, 0.4); }

    @keyframes heartbeat { 0%, 100% { transform: scale(1.05); } 50% { transform: scale(1.1); } }
    .hidden { display: none !important; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div id="loginOverlay">
  <div class="login-card">
    <img src="เที่ยวนี่เหอะ.png" style="width: 80px; margin-bottom: 20px; border-radius: 50%;">
    <h2 style="color:#38bdf8; margin-bottom: 10px;">เข้าสู่ระบบจอง</h2>
    <p style="color:#94a3b8; font-size: 13px; margin-bottom: 25px;">กรอกเบอร์โทรศัพท์เพื่อเริ่มใช้งาน</p>
    <input id="loginPhone" type="tel" class="field-input" placeholder="08x-xxx-xxxx" maxlength="10">
    <button onclick="handleLogin()" class="btn-main active">ถัดไป 🚀</button>
  </div>
</div>

<div class="header-sticky">
  <div class="header-brand">
    <img src="เที่ยวนี่เหอะ.png" alt="Logo">
    <div>
      <h1 style="font-size: 18px; color:#38bdf8;">เที่ยวนี่เหอะ</h1>
      <span id="userDisplay" style="font-size: 10px; color:#94a3b8;">ยินดีต้อนรับ...</span>
    </div>
  </div>
  <div style="display: flex; gap: 5px;">
    <button class="menu-trigger" onclick="toggleMyBookings()" style="background:#10b981; color:white; border:none; padding:8px 12px; border-radius:10px; font-size:12px;">📌 ที่จองไว้</button>
    <button class="menu-trigger" onclick="handleLogout()" style="background:#334155; color:#94a3b8; border:none; padding:8px 12px; border-radius:10px; font-size:12px;">ออก</button>
  </div>
</div>

<div id="overlay" class="overlay" onclick="toggleMyBookings()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1999;"></div>
<div id="sideMenu" style="position:fixed; top:0; right:-100%; width:85%; height:100%; background:#0f172a; z-index:2000; transition:0.4s; padding:25px; overflow-y:auto;">
  <h2 style="color:#38bdf8; border-bottom:1px solid #38bdf8; padding-bottom:10px; margin-bottom:20px;">🎒 รายการจองของฉัน</h2>
  <div id="myBookingList">
    <p style="color:#94a3b8;">กำลังโหลดข้อมูล...</p>
  </div>
  <button onclick="toggleMyBookings()" style="margin-top:20px; width:100%; padding:15px; border-radius:12px; border:1px solid #344155; background:none; color:white;">ปิดหน้าต่าง</button>
</div>

<div class="main-wrapper">
  <div class="card">
    <h2 style="text-align:center; margin-bottom:20px;">🚐 เลือกที่นั่งเดินทาง</h2>
    
    <div class="field-group">
        <label style="color:#38bdf8; font-size:14px; font-weight:600;">📅 วันเดินทาง</label>
        <input id="date" type="date" class="field-input" onchange="handleDateChange()">
    </div>

    <div class="van-container">
        <div id="grid-A" class="grid"></div>
    </div>

    <div id="formBox" class="hidden" style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
        <h3 style="color:#38bdf8; margin-bottom:15px;">ยืนยันข้อมูลผู้จอง</h3>
        <input id="name" type="text" class="field-input" placeholder="ชื่อ-นามสกุล">
        <input id="nickname" type="text" class="field-input" placeholder="ชื่อเล่น">
        <input id="line" type="text" class="field-input" placeholder="Line ID / ชื่อไลน์">
        <input id="seatField" type="hidden">
    </div>
  </div>
</div>

<div class="bottom-bar">
  <button id="mainPayBtn" onclick="showPayment()" class="btn-main" disabled>เลือกที่นั่งก่อนนะจ๊ะ</button>
</div>

<script>
const SCRIPT_URL = "YOUR_SCRIPT_URL_HERE"; 
const READ_URL = SCRIPT_URL + "?action=read";

let currentUserPhone = localStorage.getItem('userPhone') || "";

// 1. ระบบ Login
if(currentUserPhone) {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('userDisplay').innerText = "User: " + currentUserPhone;
}

function handleLogin() {
    const phone = document.getElementById('loginPhone').value;
    if(phone.length < 9) return Swal.fire('ผิดพลาด', 'กรุณากรอกเบอร์โทรให้ถูกต้อง', 'error');
    
    localStorage.setItem('userPhone', phone);
    currentUserPhone = phone;
    document.getElementById('loginOverlay').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('userDisplay').innerText = "User: " + phone;
    }, 500);
}

function handleLogout() {
    localStorage.removeItem('userPhone');
    location.reload();
}

// 2. ระบบดึงรายการจอง (เพื่อกดยกเลิก)
function toggleMyBookings() {
    const menu = document.getElementById('sideMenu');
    const overlay = document.getElementById('overlay');
    if(menu.style.right === '0px') {
        menu.style.right = '-100%';
        overlay.style.display = 'none';
    } else {
        menu.style.right = '0';
        overlay.style.display = 'block';
        fetchUserBookings();
    }
}

function fetchUserBookings() {
    const listDiv = document.getElementById('myBookingList');
    listDiv.innerHTML = "⌛ กำลังค้นหาข้อมูล...";
    
    const cbName = "cb_user_list";
    window[cbName] = (data) => {
        const myData = data.bookings.filter(b => b.phone === currentUserPhone);
        if(myData.length === 0) {
            listDiv.innerHTML = "<p style='color:#94a3b8;'>คุณยังไม่มีรายการจองครับ</p>";
        } else {
            listDiv.innerHTML = myData.map(b => `
                <div class="my-booking-item">
                    <div>
                        <div style="color:white; font-weight:bold;">ที่นั่ง ${b.seat}</div>
                        <div style="font-size:11px; color:#38bdf8;">${b.date}</div>
                    </div>
                    <button onclick="requestCancel('${b.date}', '${b.seat}')" class="btn-cancel">ยกเลิก</button>
                </div>
            `).join('');
        }
    };
    
    const script = document.createElement('script');
    script.src = `${READ_URL}&callback=${cbName}`;
    document.body.appendChild(script);
}

function requestCancel(date, seat) {
    Swal.fire({
        title: 'ยืนยันยกเลิกจอง?',
        text: `คุณกำลังจะยกเลิกที่นั่ง ${seat} ของวันที่ ${date}`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        confirmButtonText: 'ยืนยันยกเลิก',
        cancelButtonText: 'ปิด'
    }).then((result) => {
        if (result.isConfirmed) {
            // ส่งไปที่ Script (ต้องเตรียม Action 'cancel' ในฝั่ง GAS)
            const cancelUrl = `${SCRIPT_URL}?action=cancel&date=${date}&seat=${seat}&phone=${currentUserPhone}`;
            window.location.href = cancelUrl; // หรือใช้ fetch เพื่อความเนียน
        }
    });
}

// 3. ระบบแสดงผังที่นั่ง (เหมือนเดิม แต่เสริมความปลอดภัย)
function handleDateChange() {
    const dateVal = document.getElementById('date').value;
    const grid = document.getElementById('grid-A');
    grid.innerHTML = '<p style="grid-column: span 4; color:#38bdf8; text-align:center;">⌛ เช็คที่นั่งว่าง...</p>';
    
    const cbName = "cb_seats_" + Date.now();
    window[cbName] = (data) => {
        renderSeats(data.bookings || []);
    };
    const script = document.createElement('script');
    script.src = `${READ_URL}&date=${encodeURIComponent(dateVal)}&callback=${cbName}`;
    document.body.appendChild(script);
}

function renderSeats(bookedArray) {
    const bookedMap = {};
    bookedArray.forEach(b => { bookedMap[b.seat] = b.nickname || 'เต็ม'; });
    
    const grid = document.getElementById('grid-A');
    grid.innerHTML = '';
    
    // ผังจำลอง (คัน A 1-9)
    for(let i=1; i<=9; i++) {
        const seatID = "A" + i;
        const div = document.createElement('div');
        div.className = 'seat';
        
        if(bookedMap[seatID]) {
            div.classList.add('booked');
            div.innerHTML = `<span>${seatID}</span><div style="font-size:9px;">${bookedMap[seatID]}</div>`;
        } else {
            div.classList.add('empty');
            div.innerHTML = `<span>${seatID}</span><div style="font-size:9px;">ว่าง</div>`;
            div.onclick = () => selectSeat(div, seatID);
        }
        grid.appendChild(div);
    }
}

function selectSeat(el, id) {
    document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('seatField').value = id;
    document.getElementById('formBox').classList.remove('hidden');
    
    const btn = document.getElementById('mainPayBtn');
    btn.disabled = false;
    btn.classList.add('active');
    btn.innerText = "จองที่นั่ง " + id + " 🚀";
}

// เพิ่มเติม: ฟังก์ชัน showPayment() ให้ใช้ currentUserPhone จาก Login เลย

</script>
</body>
</html>
