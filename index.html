
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>จองที่นั่งรถตู้ - เที่ยวนี่เหอะ 🚐✨</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* --- CSS หลักจากของเดิมทั้งหมด --- */
    * { box-sizing: border-box !important; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif; background: #070a13; color: #f1f5f9; min-height: 100vh; overflow-x: hidden; }

    /* Login Overlay */
    #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #070a13; z-index: 5000; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
    .login-card { width: 90%; max-width: 380px; text-align: center; background: rgba(30, 41, 59, 0.7); padding: 40px 25px; border-radius: 30px; border: 1px solid rgba(56, 189, 248, 0.3); }

    .header-sticky { position: sticky; top: 0; width: 100%; background: rgba(7, 10, 19, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 1000; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-brand img { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #38bdf8; }
    .header-brand h1 { font-size: 20px; color: #38bdf8; font-weight: 700; line-height: 1.0; }

    .menu-trigger { background: rgba(56, 189, 248, 0.15); color: #38bdf8; border: 1px solid #38bdf8; padding: 8px 12px; border-radius: 12px; font-weight: 600; font-size: 12px; cursor: pointer; }
    .side-menu { position: fixed; top: 0; right: -100%; width: 80%; height: 100%; background: #0f172a; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; overflow-y: auto; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
    .side-menu.active { right: 0; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1999; backdrop-filter: blur(4px); }

    .main-wrapper { padding: 20px 15px 120px; display: flex; flex-direction: column; align-items: center; }
    .card { width: 100%; max-width: 420px; background: rgba(30, 41, 59, 0.7); border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    
    .field-group { width: 100%; margin-bottom: 18px; text-align: left; }
    .field-label { font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #38bdf8; display: block; }
    .field-input { width: 100%; padding: 0 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); font-size: 16px; background: #0f172a; color: white; height: 54px; outline: none; font-family: inherit; }

    .seat-map-img { width: 100%; border-radius: 20px; margin: 10px 0 20px; border: 1px solid rgba(255,255,255,0.08); }
    .van-container { margin-bottom: 30px; width: 100%; }
    .van-title { font-size: 14px; color: #38bdf8; margin-bottom: 10px; font-weight: 700; text-align: center; background: rgba(56,189,248,0.1); padding: 5px; border-radius: 10px; }
    
    .grid { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 8px !important; padding: 12px !important; background: rgba(0,0,0,0.3); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
    .seat { aspect-ratio: 1/1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; transition: 0.2s; position: relative; }
    .seat.driver { background: #1e293b; color: #475569; border: 1px dashed #475569; cursor: default; pointer-events: none; }
    .seat.spacer { visibility: hidden; pointer-events: none; }
    .seat.empty { background: linear-gradient(145deg, #10b981, #059669); color: white; box-shadow: 0 4px 0 #047857; }
    .seat.booked { background: linear-gradient(145deg, #ef4444, #b91c1c); color: white; box-shadow: 0 4px 0 #991b1b; cursor: not-allowed; font-size: 10px; }
    .seat.selected { background: linear-gradient(145deg, #fbbf24, #f59e0b); color: #000; box-shadow: 0 4px 0 #b45309; transform: scale(1.05); }

    .my-booking-card { background: rgba(56,189,248,0.1); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(56,189,248,0.3); display: flex; justify-content: space-between; align-items: center; }

    .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); padding: 15px 20px 30px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; display: flex; justify-content: center; }
    .btn-main { width: 100%; max-width: 400px; padding: 18px; border-radius: 18px; border: none; font-size: 18px; font-weight: 700; background: #334155; color: #64748b; cursor: pointer; }
    .btn-main.active { background: #38bdf8; color: #0f172a; box-shadow: 0 8px 20px rgba(56, 189, 248, 0.4); }
    
    .hidden { display: none !important; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body oninput="validateAll()">

<div id="loginOverlay">
  <div class="login-card">
    <img src="เที่ยวนี่เหอะ.png" style="width: 80px; border-radius: 50%; margin-bottom: 15px;">
    <h2 style="color:#38bdf8;">เข้าสู่ระบบ</h2>
    <p style="color:#94a3b8; font-size: 13px; margin-bottom: 20px;">กรอกเบอร์โทรศัพท์เพื่อดำเนินการต่อ</p>
    <input id="loginPhone" type="tel" class="field-input" placeholder="08x-xxx-xxxx" maxlength="10">
    <button onclick="handleLogin()" class="btn-main active">เข้าใช้งาน 🚀</button>
  </div>
</div>

<div class="header-sticky">
  <div class="header-brand">
    <img src="เที่ยวนี่เหอะ.png" alt="Logo">
    <div class="brand-text">
      <h1>เที่ยวนี่เหอะ</h1>
      <span id="userDisplay" style="font-size: 10px; color:#94a3b8;">User: -</span>
    </div>
  </div>
  <div style="display: flex; gap: 5px;">
    <button class="menu-trigger" onclick="toggleSideMenu('trips')">📋 ทริป</button>
    <button class="menu-trigger" onclick="toggleSideMenu('my')">📌 จองไว้</button>
  </div>
</div>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>
<div id="sideMenu" class="side-menu">
  <div id="menuContent"></div>
</div>

<div class="main-wrapper">
  <div class="card">
    <h1 style="font-size: 22px; color: #fff; text-align:center;">จองที่นั่งรถตู้ 🚐💨</h1>
    <p style="color: #94a3b8; font-size: 13px; margin: 5px 0 20px; text-align: center;">เลือกวันและทริปที่ต้องการได้เลย</p>

    <form id="bookingForm">
      <div class="field-group">
        <label class="field-label">📅 วันเดินทาง</label>
        <input id="date" name="date" type="date" class="field-input" required onchange="handleDateChange()" />
      </div>

      <div class="field-group">
        <label class="field-label">⛺ ชื่อทริป</label>
        <input id="trip" name="trip" type="text" class="field-input" placeholder="กดเมนูทริปขวาบน" required oninput="validateAll()" />
      </div>

      <img src="IMG_0444.jpeg" class="seat-map-img" alt="ผังรถ" />

      <div id="allVans">
        <div class="van-container"><div class="van-title">🚐 คันที่ 1 (สาย A)</div><div id="grid-A" class="grid"></div></div>
        <div class="van-container"><div class="van-title">🚐 คันที่ 2 (สาย B)</div><div id="grid-B" class="grid"></div></div>
        <div class="van-container"><div class="van-title">🚐 คันที่ 3 (สาย C)</div><div id="grid-C" class="grid"></div></div>
      </div>

      <input id="seatField" name="seat" type="hidden" />
      
      <div id="formBox" class="hidden" style="margin-top:20px; background:rgba(56,189,248,0.05); padding:20px; border-radius:25px; border:1px solid rgba(56,189,248,0.3);">
        <h3 style="text-align: center; color: #38bdf8; margin-bottom: 15px;">📝 ข้อมูลผู้จอง</h3>
        <div class="field-group">
          <label class="field-label">👤 ชื่อ-นามสกุล</label>
          <input id="name" name="name" type="text" class="field-input" placeholder="ชื่อจริง-นามสกุล" required />
        </div>
        <div style="display:flex; gap:10px;">
            <input id="nickname" name="nickname" type="text" class="field-input" placeholder="ชื่อเล่น" required />
            <input id="phone" name="phone" type="tel" class="field-input" readonly /> </div>
        <input id="line" name="line" type="text" class="field-input" placeholder="ชื่อไลน์" required />
      </div>
    </form>
  </div>
</div>

<div class="bottom-bar">
  <button type="button" id="mainPayBtn" onclick="showPayment()" class="btn-main" disabled>เลือกที่นั่งก่อนนะจ๊ะ</button>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw7OvKq9CZ2bgRI61UpGVTCqYYSm4xSz4DcDwkwEaTXG0yfhldX34Bmnqi5m7y6cnS-/exec";
const READ_URL = SCRIPT_URL + "?action=read";

const SEAT_LAYOUT = ['driver', 3, 6, 9, 'spacer', 2, 5, 8, 'ซ้าย', 1, 4, 7];
let currentUserPhone = localStorage.getItem('userPhone') || "";

// --- ระบบ Login ---
if(currentUserPhone) {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('userDisplay').innerText = "User: " + currentUserPhone;
    document.getElementById('phone').value = currentUserPhone;
}

function handleLogin() {
    const p = document.getElementById('loginPhone').value;
    if(p.length < 10) return Swal.fire('เบอร์ไม่ครบ!', 'กรุณากรอกเบอร์โทร 10 หลักนะจ๊ะ', 'error');
    localStorage.setItem('userPhone', p);
    location.reload();
}

// --- จัดการผังที่นั่ง ---
function handleDateChange() {
    const d = document.getElementById('date').value;
    ['A','B','C'].forEach(id => document.getElementById(`grid-${id}`).innerHTML = '<p style="grid-column:span 4; color:#38bdf8; font-size:12px; padding:10px;">⌛ โหลด...</p>');
    loadBooked(d);
}

function loadBooked(date) {
    const cb = "cb_" + Date.now();
    window[cb] = (data) => { renderVans(data.bookings || []); delete window[cb]; };
    const s = document.createElement('script');
    s.src = `${READ_URL}&date=${encodeURIComponent(date)}&callback=${cb}`;
    document.body.appendChild(s);
}

function renderVans(bookedArray) {
    const map = {}; bookedArray.forEach(b => map[b.seat] = b.nickname);
    ['A','B','C'].forEach(pre => {
        const g = document.getElementById(`grid-${pre}`);
        g.innerHTML = '';
        SEAT_LAYOUT.forEach(n => {
            const div = document.createElement('div');
            const sid = pre + n;
            if(n==='driver'){ div.className='seat driver'; div.innerHTML='👨‍✈️'; }
            else if(n==='spacer'){ div.className='seat spacer'; }
            else {
                div.className = 'seat ' + (map[sid] ? 'booked' : 'empty');
                div.innerHTML = map[sid] ? `<span style="font-size:8px;">${sid}</span>${map[sid]}` : `<span>${sid}</span>`;
                if(!map[sid]) div.onclick = () => selectSeat(div, sid);
            }
            g.appendChild(div);
        });
    });
}

function selectSeat(el, id) {
    if(!document.getElementById('date').value) return Swal.fire('เลือกวันก่อน!', '', 'warning');
    document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('seatField').value = id;
    document.getElementById('formBox').classList.remove('hidden');
    validateAll();
}

function validateAll() {
    const isOk = ['date','trip','seatField','name','nickname','line'].every(id => document.getElementById(id).value !== "");
    const btn = document.getElementById('mainPayBtn');
    btn.disabled = !isOk;
    if(isOk){ btn.classList.add('active'); btn.innerText = "ไปโอนเงินกัน! 🚀"; }
}

// --- เมนู Side Menu (ทริป & รายการของฉัน) ---
function toggleSideMenu(mode) {
    const menu = document.getElementById('sideMenu');
    const content = document.getElementById('menuContent');
    document.getElementById('overlay').style.display = 'block';
    menu.classList.add('active');

    if(mode === 'trips') {
        content.innerHTML = '<h3>📍 ทริปที่เปิดจอง</h3><p>กำลังโหลด...</p>';
        fetchTrips();
    } else {
        content.innerHTML = '<h3>🎒 ของฉันที่จองไว้</h3><p>กำลังโหลด...</p>';
        fetchMyBookings();
    }
}

function closeMenu() {
    document.getElementById('sideMenu').classList.remove('active');
    document.getElementById('overlay').style.display = 'none';
}

function fetchTrips() {
    const cb = "cb_trips";
    window[cb] = (data) => {
        const unique = Array.from(new Set(data.bookings.map(b => JSON.stringify({t:b.trip, d:b.date})))).map(s => JSON.parse(s));
        document.getElementById('menuContent').innerHTML = '<h3>📍 ทริปที่เปิดจอง</h3>' + unique.map(i => `
            <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; margin-bottom:10px; border-left:4px solid #38bdf8;" onclick="setTrip('${i.t}','${i.d}')">
                <b>${i.t}</b><br><small>📅 ${i.d}</small>
            </div>`).join('');
    };
    const s = document.createElement('script'); s.src = `${READ_URL}&callback=${cb}`; document.body.appendChild(s);
}

function setTrip(t, d) {
    document.getElementById('trip').value = t;
    document.getElementById('date').value = d.split('T')[0];
    closeMenu();
    handleDateChange();
}

function fetchMyBookings() {
    const cb = "cb_my";
    window[cb] = (data) => {
        const mine = data.bookings.filter(b => b.phone === currentUserPhone);
        document.getElementById('menuContent').innerHTML = '<h3>🎒 ของฉันที่จองไว้</h3>' + (mine.length ? mine.map(b => `
            <div class="my-booking-card">
                <div><b>${b.trip}</b><br><small>ที่นั่ง ${b.seat} | ${b.date}</small></div>
                <button onclick="cancelBooking('${b.date}','${b.seat}')" style="background:#ef4444; color:white; border:none; padding:5px 10px; border-radius:8px;">ยกเลิก</button>
            </div>`).join('') : '<p>ยังไม่มีการจอง</p>');
    };
    const s = document.createElement('script'); s.src = `${READ_URL}&callback=${cb}`; document.body.appendChild(s);
}

function cancelBooking(date, seat) {
    Swal.fire({
        title: 'ยืนยันยกเลิกจอง?',
        text: `ที่นั่ง ${seat} วันที่ ${date}`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'ยกเลิกจอง!',
        confirmButtonColor: '#ef4444'
    }).then(r => {
        if(r.isConfirmed) {
            // ส่ง Action Cancel ไปยัง Script
            window.location.href = `${SCRIPT_URL}?action=cancel&date=${date}&seat=${seat}&phone=${currentUserPhone}`;
        }
    });
}

function showPayment() {
    // โค้ดส่วนโอนเงิน (PayModal) คุณสามารถก๊อปจากอันเดิมมาใส่ได้เลยครับ โครงสร้างเหมือนกัน
    Swal.fire('ระบบพร้อมส่งข้อมูล!', 'ขั้นตอนนี้จะเหมือนเดิมครับ คือแสดง QR และกดยืนยัน', 'info').then(() => {
        // ... โค้ดส่งข้อมูล POST ไป Script ...
    });
}
</script>
</body>
</html>
